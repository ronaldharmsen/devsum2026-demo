name: Build, Scan, Sign

# Companion workflow for the DevSum 2026 talk "Locking Down Containers".
# Produces a signed, scanned .NET 10 chiseled image at:
#   ghcr.io/ronaldharmsen/devsum2026-demo:<sha>
#   ghcr.io/ronaldharmsen/devsum2026-demo:latest
#
# Signing is keyless via Sigstore — the workflow's OIDC token IS the
# identity. Verification policies (Kyverno) pin on this workflow's
# subject + issuer.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # required for OIDC keyless cosign signing

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64        # single-arch keeps cosign's signed digest unambiguous
          provenance: false             # skip buildkit's attestation manifest list
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Trivy gate (fail build on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless via OIDC)
        run: |
          cosign sign --yes \
            --new-bundle-format=false \
            --use-signing-config=false \
            ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
        # No --key flag, no secrets. cosign trades the workflow's OIDC token
        # at Fulcio for a 10-minute cert, signs the digest, publishes the
        # cert + Rekor entry. The cert's subject is this workflow's URI.
